
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Chaotic Button Game – Hard Mode</title>
<style>
 body { background:#000; color:white; font-family:sans-serif; text-align:center; margin-top:20px; }
 #gameArea { position:relative; width:900px; height:550px; margin:20px auto; background:#111; border:4px solid #777; overflow:hidden; cursor:crosshair; }
 #theButton { position:absolute; padding:18px 30px; background:#d00; color:white; border:none; border-radius:10px; font-size:20px; cursor:pointer; transition:0.03s; }
 .blocker { position:absolute; width:150px; height:50px; background:#444; border:2px solid #aaa; }
 #wind { margin-top:10px; font-size:20px; }
 .flash { animation: flash 0.15s; }
 @keyframes flash { from { background:#fff; } to { background:#111; } }
</style>
</head>
<body>
<h1>CHAOTIC HARD MODE</h1>
<p>You wanted harder. Here it is.</p>
<div id="gameArea">
 <button id="theButton">PRESS</button>
 <div class="blocker" id="blocker1"></div>
 <div class="blocker" id="blocker2"></div>
 <div class="blocker" id="blocker3"></div>
 <div class="blocker" id="blocker4"></div>
 <div class="blocker" id="blocker5"></div>
 <div class="blocker" id="blocker6"></div>
</div>
<div id="wind">Wind: 0</div>
<script>
const game = document.getElementById('gameArea');
const btn = document.getElementById('theButton');
const blockers = [
 document.getElementById('blocker1'), document.getElementById('blocker2'), document.getElementById('blocker3'),
 document.getElementById('blocker4'), document.getElementById('blocker5'), document.getElementById('blocker6')
];
const windDisplay = document.getElementById('wind');
let windForce = 0;
let cursorX = 0, cursorY = 0;

function randomPos(el) {
 el.style.left = Math.random() * (game.clientWidth - el.clientWidth) + 'px';
 el.style.top = Math.random() * (game.clientHeight - el.clientHeight) + 'px';
}
randomPos(btn);
blockers.forEach(b => randomPos(b));

// HARD MODE BLOCKER MOVEMENT
function animateBlockers() {
 blockers.forEach((b, i) => {
 const x = (Math.sin(Date.now()/200 + i) * 350) + 400;
 const y = (Math.cos(Date.now()/300 + i*3) * 230) + 250;
 b.style.left = Math.min(Math.max(x, 0), game.clientWidth - b.clientWidth) + 'px';
 b.style.top = Math.min(Math.max(y, 0), game.clientHeight - b.clientHeight) + 'px';
 });
 requestAnimationFrame(animateBlockers);
}
animateBlockers();

// STRONGER WIND
setInterval(() => {
 windForce = (Math.random() - 0.5) * 200;
 windDisplay.textContent = 'Wind: ' + windForce.toFixed(1);
}, 500);

// CURSOR TRACKING
game.addEventListener('mousemove', e => { cursorX = e.offsetX; cursorY = e.offsetY; });

// HARD MODE BUTTON LOGIC
function update() {
 const bx = btn.offsetLeft + btn.clientWidth/2;
 const by = btn.offsetTop + btn.clientHeight/2;
 const dx = cursorX - bx;
 const dy = cursorY - by;
 const dist = Math.sqrt(dx*dx + dy*dy);

 // MORE FREQUENT TELEPORTS
 if (Math.random() < 0.02) randomPos(btn);

 // FASTER BUTTON DODGE
 if (dist < 250) {
 btn.style.left = Math.min(Math.max(btn.offsetLeft - dx * 0.4, 0), game.clientWidth - btn.clientWidth) + 'px';
 btn.style.top = Math.min(Math.max(btn.offsetTop - dy * 0.4, 0), game.clientHeight - btn.clientHeight) + 'px';
 }

 // STRONGER WIND PUSH
 btn.style.left = Math.min(Math.max(btn.offsetLeft + windForce * 0.08, 0), game.clientWidth - btn.clientWidth) + 'px';

 // MORE FREQUENT FLASHES
 if (Math.random() < 0.01) {
 game.classList.add('flash');
 setTimeout(() => game.classList.remove('flash'), 150);
 }

 requestAnimationFrame(update);
}
update();

// WIN CONDITION
btn.addEventListener('click', () => {
 alert('You beat HARD MODE. Incredible.');
 randomPos(btn);
});
</script>
</body>
</html>
